<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lodestone - Compass</title>
<link rel="icon" type="image/svg+xml" href="lodestone_logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#0a0d12;
    --bg-1:#12161d;
    --face:#161b23;
    --line:#2a3140;
    --line-soft:#1e242e;
    --ink:#e7ebf2;
    --ink-dim:#7b8494;
    --amber:#ff8a3d;
    --amber-dim:#8a4d26;
    --teal:#2dd4bf;
    --danger:#ff5d5d;
  }

  *{box-sizing:border-box;}

  html{ height:100%; }

  body{
    margin:0;
    min-height:100vh;
    min-height:100dvh;      /* accounts for mobile browser chrome */
    width:100%;
    overflow-y:auto;         /* fallback scroll instead of hard clip on short viewports */
    overflow-x:hidden;
    background:
      radial-gradient(120% 90% at 50% -10%, #182030 0%, var(--bg-0) 55%),
      var(--bg-0);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    -webkit-font-smoothing:antialiased;
    padding:20px 16px;
    padding-top:max(20px, env(safe-area-inset-top));
    padding-bottom:max(20px, env(safe-area-inset-bottom));
    gap:4px;
  }

  .eyebrow{
    font-family:'Space Mono', monospace;
    font-size:0.7rem;
    letter-spacing:0.35em;
    text-transform:uppercase;
    color:var(--ink-dim);
    margin-bottom:6px;
  }

  .hud{
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-bottom:22px;
  }

  .hud-value{
    font-family:'Space Mono', monospace;
    font-size:clamp(2rem, 9vw, 3rem);
    font-weight:700;
    line-height:1;
    letter-spacing:0.02em;
    color:var(--ink);
    font-variant-numeric:tabular-nums;
    min-width:clamp(100px, 30vw, 150px);
    text-align:right;
  }
  .hud-deg{ color:var(--amber); }

  .hud-label{
    font-family:'Space Mono', monospace;
    font-size:clamp(1rem, 4vw, 1.35rem);
    font-weight:700;
    color:var(--teal);
    letter-spacing:0.08em;
    min-width:44px;
  }

  .stage{
    position:relative;
    width:min(78vw, 60vh, 340px);
    height:min(78vw, 60vh, 340px);
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* fixed outer bezel */
  .bezel{
    position:absolute;
    inset:0;
    border-radius:50%;
    background:
      radial-gradient(circle at 32% 28%, #232a36 0%, #12161d 60%, #0c0f14 100%);
    box-shadow:
      0 0 0 1px #060810,
      0 30px 60px -20px rgba(0,0,0,0.7),
      inset 0 2px 3px rgba(255,255,255,0.04),
      inset 0 -14px 30px rgba(0,0,0,0.6);
  }

  .glass{
    position:absolute;
    inset:14px;
    border-radius:50%;
    background:var(--face);
    box-shadow:
      inset 0 0 0 1px var(--line),
      inset 0 18px 40px rgba(0,0,0,0.55);
    overflow:hidden;
  }

  .glass::after{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    background:linear-gradient(155deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0) 30%);
    pointer-events:none;
  }

  #dial{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    transform:rotate(0deg);
    will-change:transform;
  }

  .tick-cardinal{ stroke:var(--ink); }
  .tick-inter{ stroke:var(--ink-dim); }
  .tick-minor{ stroke:var(--line); }

  .label-cardinal{
    fill:var(--ink);
    font-family:'Space Mono', monospace;
    font-weight:700;
  }
  .label-N{ fill:var(--amber); }
  .label-inter{
    fill:var(--ink-dim);
    font-family:'Space Mono', monospace;
    font-weight:700;
  }
  .label-deg{
    fill:#4b5468;
    font-family:'Space Mono', monospace;
  }

  /* fixed lubber line (points to true "forward") */
  .lubber{
    position:absolute;
    top:2px;
    left:50%;
    transform:translateX(-50%);
    width:0;
    height:0;
    border-left:9px solid transparent;
    border-right:9px solid transparent;
    border-top:14px solid var(--amber);
    filter:drop-shadow(0 0 6px rgba(255,138,61,0.6));
    z-index:5;
  }

  .center-cap{
    position:absolute;
    width:14px;
    height:14px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #4a5568, #1a1f27 70%);
    box-shadow:0 0 0 1px var(--line), 0 2px 6px rgba(0,0,0,0.6);
    z-index:4;
  }

  .status{
    margin-top:26px;
    font-family:'Space Mono', monospace;
    font-size:0.75rem;
    color:var(--ink-dim);
    text-align:center;
    min-height:1.2em;
    letter-spacing:0.02em;
    max-width:320px;
    padding:0 12px;
  }

  .status.warn{ color:var(--amber); }
  .status.error{ color:var(--danger); }
  .status.ok{ color:var(--teal); }

  #start-btn{
    margin-top:22px;
    padding:14px 32px;
    font-family:'Inter', sans-serif;
    font-size:0.95rem;
    font-weight:600;
    letter-spacing:0.01em;
    color:#0a0d12;
    background:linear-gradient(180deg, #ffb27a, var(--amber));
    border:none;
    border-radius:999px;
    cursor:pointer;
    box-shadow:0 8px 24px -6px rgba(255,138,61,0.45);
    transition:transform 0.15s ease, box-shadow 0.15s ease, opacity 0.2s ease;
  }
  #start-btn:hover{ transform:translateY(-1px); box-shadow:0 10px 28px -6px rgba(255,138,61,0.6); }
  #start-btn:active{ transform:translateY(0px) scale(0.98); }
  #start-btn:disabled{
    background:#2a3140;
    color:var(--ink-dim);
    cursor:not-allowed;
    box-shadow:none;
    opacity:0.7;
  }

  .pulse{
    position:absolute;
    inset:14px;
    border-radius:50%;
    box-shadow:0 0 0 0 rgba(45,212,191,0.35);
    animation:pulse 2.2s ease-out infinite;
    pointer-events:none;
    z-index:6;
  }
  @keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(45,212,191,0.35); }
    100%{ box-shadow:0 0 0 18px rgba(45,212,191,0); }
  }

  @media (prefers-reduced-motion: reduce){
    #dial{ transition:none; }
    .pulse{ animation:none; }
  }

  /* short viewports (landscape phones, small tablets) — tighten vertical rhythm */
  @media (max-height: 560px){
    body{ padding:12px 16px; gap:2px; }
    .eyebrow{ margin-bottom:2px; }
    .hud{ margin-bottom:10px; }
    .status{ margin-top:12px; font-size:0.68rem; }
    #start-btn{ margin-top:12px; padding:10px 26px; }
  }

  /* wider screens (tablet/desktop) — cap stage growth, don't stretch huge */
  @media (min-width: 700px){
    .stage{ width:min(40vw, 60vh, 340px); height:min(40vw, 60vh, 340px); }
  }

  .source-badge{
    font-family:'Space Mono', monospace;
    font-size:0.62rem;
    letter-spacing:0.18em;
    color:var(--bg-0);
    background:var(--ink-dim);
    padding:3px 10px;
    border-radius:999px;
    margin-bottom:16px;
    font-weight:700;
  }
  .source-badge.gps{ background:var(--teal); }
  .source-badge.compass{ background:var(--amber); }

  #gps-btn{
    margin-top:10px;
    padding:9px 20px;
    font-family:'Inter', sans-serif;
    font-size:0.8rem;
    font-weight:600;
    color:var(--teal);
    background:transparent;
    border:1px solid var(--teal);
    border-radius:999px;
    cursor:pointer;
    transition:background 0.15s ease;
  }
  #gps-btn:hover{ background:rgba(45,212,191,0.1); }
  #gps-btn:disabled{
    color:var(--ink-dim);
    border-color:var(--line);
    cursor:not-allowed;
  }

  /* ---- Calibration modal ---- */
  .calib-overlay{
    position:fixed;
    inset:0;
    background:rgba(10,13,18,0.86);
    backdrop-filter:blur(4px);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
    padding:24px;
  }
  .calib-overlay.show{ display:flex; }
  .calib-card{
    background:var(--face);
    border:1px solid var(--line);
    border-radius:20px;
    padding:32px 28px;
    max-width:300px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  .calib-icon{ width:84px; height:84px; margin:0 auto 18px; }
  .calib-title{
    font-family:'Space Mono', monospace;
    font-weight:700;
    font-size:1rem;
    color:var(--ink);
    margin-bottom:8px;
    letter-spacing:0.02em;
  }
  .calib-body{
    font-size:0.85rem;
    color:var(--ink-dim);
    line-height:1.5;
    margin-bottom:20px;
  }
  .calib-skip{
    background:transparent;
    border:1px solid var(--line);
    color:var(--ink-dim);
    padding:9px 22px;
    border-radius:999px;
    font-family:'Inter', sans-serif;
    font-size:0.82rem;
    cursor:pointer;
  }
  .calib-skip:hover{ border-color:var(--ink-dim); color:var(--ink); }

  @keyframes infinityDraw{
    0%{ stroke-dashoffset:220; }
    100%{ stroke-dashoffset:0; }
  }
  .calib-icon path{
    stroke-dasharray:220;
    animation:infinityDraw 1.8s linear infinite;
  }

  /* ---- Sensor debug panel ---- */
  .debug-toggle{
    margin-top:14px;
    font-family:'Space Mono', monospace;
    font-size:0.65rem;
    letter-spacing:0.1em;
    color:var(--line);
    background:none;
    border:none;
    cursor:pointer;
    text-decoration:underline;
    text-underline-offset:3px;
  }
  .debug-toggle:hover{ color:var(--ink-dim); }
  .debug-panel{
    display:none;
    margin-top:10px;
    font-family:'Space Mono', monospace;
    font-size:0.68rem;
    color:var(--ink-dim);
    background:var(--bg-1);
    border:1px solid var(--line);
    border-radius:10px;
    padding:12px 14px;
    max-width:320px;
    width:88vw;
    line-height:1.7;
    text-align:left;
  }
  .debug-panel.show{ display:block; }
  .debug-panel .row{ display:flex; justify-content:space-between; gap:10px; }
  .debug-panel .k{ color:var(--line); }
  .debug-panel .v{ color:var(--teal); font-variant-numeric:tabular-nums; }
</style>
</head>
<body>

  <div class="calib-overlay" id="calib-overlay">
    <div class="calib-card">
      <svg class="calib-icon" viewBox="0 0 100 60" fill="none">
        <path d="M25,30 C25,15 40,15 50,30 C60,45 75,45 75,30 C75,15 60,15 50,30 C40,45 25,45 25,30 Z"
              stroke="#ff8a3d" stroke-width="4" stroke-linecap="round"/>
      </svg>
      <div class="calib-title">Calibrating</div>
      <div class="calib-body" id="calib-body">Move your phone in a slow figure‑8 (infinity) motion for a few seconds. This lets the gyroscope and magnetometer sync up for maximum precision.</div>
      <button class="calib-skip" id="calib-skip">Skip</button>
    </div>
  </div>

  <div class="eyebrow">Live Heading</div>
  <div class="hud">
    <div class="hud-value" id="hud-value">--<span class="hud-deg">°</span></div>
    <div class="hud-label" id="hud-label">—</div>
  </div>
  <div class="source-badge" id="source-badge" style="display:none;">COMPASS</div>

  <div class="stage">
    <div class="bezel"></div>
    <div class="glass">
      <svg id="dial" viewBox="0 0 300 300"></svg>
    </div>
    <div class="pulse" id="pulse" style="display:none;"></div>
    <div class="lubber"></div>
    <div class="center-cap"></div>
  </div>

  <div class="status" id="status">Tap enable to start the compass. Requires a device with an orientation sensor.</div>
  <button id="start-btn">Enable Compass</button>
  <button id="gps-btn" style="display:none;">Boost accuracy with GPS (for walking)</button>
  <button class="debug-toggle" id="debug-toggle" style="display:none;">SHOW RAW SENSOR DATA</button>
  <div class="debug-panel" id="debug-panel"></div>

<script>
(function(){

  const btn        = document.getElementById('start-btn');
  const gpsBtn      = document.getElementById('gps-btn');
  const statusEl    = document.getElementById('status');
  const dial        = document.getElementById('dial');
  const hudValue     = document.getElementById('hud-value');
  const hudLabel     = document.getElementById('hud-label');
  const pulseEl      = document.getElementById('pulse');
  const sourceBadge  = document.getElementById('source-badge');
  const calibOverlay = document.getElementById('calib-overlay');
  const calibSkipBtn = document.getElementById('calib-skip');
  const debugToggle  = document.getElementById('debug-toggle');
  const debugPanel   = document.getElementById('debug-panel');

  const POINTS_16 = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];

  function setStatus(text, kind){
    statusEl.textContent = text;
    statusEl.className = 'status' + (kind ? ' ' + kind : '');
  }

  function headingToLabel16(deg){
    const idx = Math.round(((deg % 360) / 22.5)) % 16;
    return POINTS_16[idx];
  }

  // ---------- Build the compass rose (SVG) ----------
  const labelNodes = []; // { el, lx, ly } — needed to keep letters upright as the dial spins

  function buildDial(){
    const cx = 150, cy = 150, r = 140;
    const ns = 'http://www.w3.org/2000/svg';
    const frag = document.createDocumentFragment();

    for(let deg = 0; deg < 360; deg += 5){
      const rad = (deg - 90) * Math.PI / 180; // 0deg = top
      const isCardinal   = deg % 90 === 0;
      const isIntercard  = deg % 45 === 0 && !isCardinal;
      const isThirty     = deg % 30 === 0 && !isCardinal && !isIntercard;

      let tickLen = 8, cls = 'tick-minor', strokeW = 1;
      if(isCardinal){ tickLen = 22; cls = 'tick-cardinal'; strokeW = 2.5; }
      else if(isIntercard){ tickLen = 16; cls = 'tick-inter'; strokeW = 2; }
      else if(isThirty){ tickLen = 11; cls = 'tick-minor'; strokeW = 1.4; }

      const x1 = cx + (r) * Math.cos(rad);
      const y1 = cy + (r) * Math.sin(rad);
      const x2 = cx + (r - tickLen) * Math.cos(rad);
      const y2 = cy + (r - tickLen) * Math.sin(rad);

      const line = document.createElementNS(ns, 'line');
      line.setAttribute('x1', x1.toFixed(2));
      line.setAttribute('y1', y1.toFixed(2));
      line.setAttribute('x2', x2.toFixed(2));
      line.setAttribute('y2', y2.toFixed(2));
      line.setAttribute('class', cls);
      line.setAttribute('stroke-width', strokeW);
      line.setAttribute('stroke-linecap', 'round');
      frag.appendChild(line);
      // Ticks are just radial lines — visually fine to rotate freely, no counter-rotation needed.

      // labels
      if(isCardinal || isIntercard){
        const labelR = r - tickLen - 16;
        const lx = cx + labelR * Math.cos(rad);
        const ly = cy + labelR * Math.sin(rad);
        const text = document.createElementNS(ns, 'text');
        text.setAttribute('x', lx.toFixed(2));
        text.setAttribute('y', ly.toFixed(2));
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('dominant-baseline', 'central');

        if(isCardinal){
          const dirMap = {0:'N', 90:'E', 180:'S', 270:'W'};
          text.setAttribute('class', 'label-cardinal' + (deg === 0 ? ' label-N' : ''));
          text.setAttribute('font-size', '17');
          text.textContent = dirMap[deg];
        } else {
          const dirMap = {45:'NE', 135:'SE', 225:'SW', 315:'NW'};
          text.setAttribute('class', 'label-inter');
          text.setAttribute('font-size', '11');
          text.textContent = dirMap[deg];
        }
        frag.appendChild(text);
        labelNodes.push({ el: text, lx, ly }); // counter-rotated every frame — see animate()
      } else if(isThirty){
        const labelR = r - tickLen - 12;
        const lx = cx + labelR * Math.cos(rad);
        const ly = cy + labelR * Math.sin(rad);
        const text = document.createElementNS(ns, 'text');
        text.setAttribute('x', lx.toFixed(2));
        text.setAttribute('y', ly.toFixed(2));
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('dominant-baseline', 'central');
        text.setAttribute('class', 'label-deg');
        text.setAttribute('font-size', '8');
        text.textContent = deg;
        frag.appendChild(text);
        labelNodes.push({ el: text, lx, ly });
      }
    }

    dial.appendChild(frag);
  }

  buildDial();

  // ---------- Smooth rotation loop ----------
  let currentHeading = 0;   // what's currently rendered
  let targetHeading   = 0;  // latest sensor reading
  let hasReading      = false;

  function shortestDelta(from, to){
    let d = (to - from) % 360;
    if(d > 180) d -= 360;
    if(d < -180) d += 360;
    return d;
  }

  function animate(){
    if(hasReading){
      const delta = shortestDelta(currentHeading, targetHeading);
      currentHeading = (currentHeading + delta * 0.14 + 360) % 360;
      dial.style.transform = `rotate(${-currentHeading}deg)`;

      // Counter-rotate each label around its own point so it stays upright
      // and readable — only its position orbits with the dial, not its orientation.
      for(let i = 0; i < labelNodes.length; i++){
        const n = labelNodes[i];
        n.el.setAttribute('transform', `rotate(${currentHeading.toFixed(2)} ${n.lx} ${n.ly})`);
      }
    }
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);

  // ---------- Sensor handling ----------
  let firstEventTimer = null;

  function onFirstReading(){
    hasReading = true;
    pulseEl.style.display = 'block';
    gpsBtn.style.display = 'inline-block';
    if(firstEventTimer){ clearTimeout(firstEventTimer); firstEventTimer = null; }
  }

  // Circular (angle-aware) exponential smoothing — reduces raw sensor jitter
  // in the numeric readout without adding perceptible lag. Plain averaging
  // breaks at the 0/360 wraparound, so this averages via unit-vector components.
  let smoothedHeading = null;
  const SMOOTHING = 0.35; // higher = more responsive, lower = more stable

  function smoothAngle(newDeg){
    if(smoothedHeading === null){ smoothedHeading = newDeg; return newDeg; }
    const prevRad = smoothedHeading * Math.PI / 180;
    const newRad  = newDeg * Math.PI / 180;
    const x = Math.cos(prevRad) * (1 - SMOOTHING) + Math.cos(newRad) * SMOOTHING;
    const y = Math.sin(prevRad) * (1 - SMOOTHING) + Math.sin(newRad) * SMOOTHING;
    smoothedHeading = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
    return smoothedHeading;
  }

  // ----------------------------------------------------------------------
  // TILT-AWARE HEADING — root-cause fix for "tilting up/down = wrong direction"
  //
  // The previous version used ONE fixed reference axis on the device (its
  // +Y / "top of screen" edge) to derive heading from alpha/beta/gamma.
  // That axis is a good heading reference when the phone is flat (beta≈0,
  // like resting on your palm) — but per the W3C spec's own rotation matrix,
  // that same axis's horizontal projection collapses toward (0,0) as
  // beta→90° (phone held upright, screen vertical — the exact posture
  // people naturally use when glancing at a phone while walking, and
  // exactly what you pass through when tilting the phone up/down). Dividing
  // by a near-zero vector is what produced the erratic/incorrect readings.
  //
  // Fix: use TWO device axes as heading references —
  //   • +Y (top edge)   — reliable when the phone is flat
  //   • -Z (back of phone) — reliable when the phone is upright/vertical
  // and cross-fade between them based on current tilt, so there is always
  // a well-conditioned (non-degenerate) vector driving the atan2. This
  // mirrors how native "flat compass ↔ AR/upright compass" mode switching
  // works, just done as a continuous blend instead of a hard cut.
  //
  // Derived directly from the W3C DeviceOrientation rotation matrix
  // (R = Rz(alpha)·Rx(beta)·Ry(gamma)); verified numerically at beta=0,
  // beta=90, and beta=180 boundary cases before shipping.
  // ----------------------------------------------------------------------
  function tiltAwareHeading(alphaDeg, betaDeg, gammaDeg){
    const d2r = Math.PI / 180;
    const a = alphaDeg * d2r, b = betaDeg * d2r, g = gammaDeg * d2r;

    const ca = Math.cos(a), sa = Math.sin(a);
    const cb = Math.cos(b), sb = Math.sin(b);
    const cg = Math.cos(g), sg = Math.sin(g);

    // Horizontal (world X=East, Y=North) projection of the device's +Y axis
    // (top-of-screen edge) — column 2 of the W3C rotation matrix.
    const flatX = -cb * sa;
    const flatY =  ca * cb;

    // Horizontal projection of the device's -Z axis (back of phone, i.e.
    // the direction you're facing when holding it up like a camera/AR view)
    // — negated column 3 of the W3C rotation matrix.
    const uprightX = -(cg * sa * sb + ca * sg);
    const uprightY = -(sa * sg - ca * cg * sb);

    // Blend weight: each candidate is weighted by its OWN horizontal
    // projection magnitude — self-normalizing, so whichever axis is
    // closer to vertical (near-zero horizontal projection) naturally
    // fades out without needing a separate beta-based heuristic.
    const wFlat = Math.hypot(flatX, flatY);
    const wUpright = Math.hypot(uprightX, uprightY);

    const x = flatX * wFlat + uprightX * wUpright;
    const y = flatY * wFlat + uprightY * wUpright;

    if(Math.abs(x) < 1e-9 && Math.abs(y) < 1e-9){
      // Both references degenerate simultaneously — vanishingly rare
      // (would need a very specific gamma at the flat/upright crossover).
      // Fall back to raw alpha rather than produce NaN.
      return (360 - alphaDeg + 360) % 360;
    }

    const heading = Math.atan2(x, y) * (180 / Math.PI);
    return (heading + 360) % 360;
  }

  // ========================================================================
  // GYRO + MAGNETOMETER SENSOR FUSION (complementary filter, quaternion-based)
  //
  // This is the same class of technique native compass/AR apps use: the
  // gyroscope (angular velocity) is integrated continuously for smooth,
  // tremor-immune, moment-to-moment orientation tracking; the magnetometer
  // is used only as a slow correction that pulls the integrated estimate
  // back toward true north, preventing gyro drift, without letting
  // magnetometer noise/interference dominate the visible output.
  //
  // Why complementary filter, not a full Kalman filter: a Kalman filter
  // needs modeled process/measurement noise covariances to be worth its
  // complexity — those aren't knowable for an arbitrary phone/browser
  // combination without on-device calibration data we don't have. A
  // complementary filter with a tuned correction constant gives ~95% of
  // the practical benefit with far less risk of a subtly wrong covariance
  // producing worse results than no fusion at all. This is also what the
  // reference/example AHRS implementations most native compass apps are
  // built on (Madgwick/Mahony-style filters) reduce to in the small-angle,
  // single-correction-source case.
  // ========================================================================

  function quatMultiply(a, b){
    const [w1,x1,y1,z1] = a, [w2,x2,y2,z2] = b;
    return [
      w1*w2 - x1*x2 - y1*y2 - z1*z2,
      w1*x2 + x1*w2 + y1*z2 - z1*y2,
      w1*y2 - x1*z2 + y1*w2 + z1*x2,
      w1*z2 + x1*y2 - y1*x2 + z1*w2
    ];
  }

  function quatNormalize(q){
    const n = Math.hypot(q[0], q[1], q[2], q[3]);
    if(n < 1e-12) return [1, 0, 0, 0];
    return [q[0]/n, q[1]/n, q[2]/n, q[3]/n];
  }

  // W3C DeviceOrientation spec's canonical quaternion construction
  // (device→world, ZXY intrinsic Tait-Bryan convention) — same rotation
  // this app's Euler-based formula above uses, just as a quaternion.
  function quatFromEuler(alphaDeg, betaDeg, gammaDeg){
    const d2r = Math.PI / 180;
    const _x = betaDeg  * d2r / 2;
    const _y = gammaDeg * d2r / 2;
    const _z = alphaDeg * d2r / 2;
    const cX = Math.cos(_x), cY = Math.cos(_y), cZ = Math.cos(_z);
    const sX = Math.sin(_x), sY = Math.sin(_y), sZ = Math.sin(_z);
    return [
      cX*cY*cZ - sX*sY*sZ,
      sX*cY*cZ - cX*sY*sZ,
      cX*sY*cZ + sX*cY*sZ,
      cX*cY*sZ + sX*sY*cZ
    ];
  }

  // Nlerp (normalized-lerp) toward a target quaternion, with shortest-path
  // sign correction. Used at small weights as the magnetometer correction
  // step — at small t this is numerically equivalent to a true slerp for
  // our purposes, without slerp's extra trig cost on every sensor sample.
  function quatNlerpToward(q, target, t){
    let dot = q[0]*target[0] + q[1]*target[1] + q[2]*target[2] + q[3]*target[3];
    let tgt = target;
    if(dot < 0){ tgt = [-target[0], -target[1], -target[2], -target[3]]; }
    return quatNormalize([
      q[0]*(1-t) + tgt[0]*t,
      q[1]*(1-t) + tgt[1]*t,
      q[2]*(1-t) + tgt[2]*t,
      q[3]*(1-t) + tgt[3]*t
    ]);
  }

  // Extract compass heading from a fused quaternion using the same
  // dual-axis (flat / upright) blend as tiltAwareHeading, but reading the
  // axis projections directly off the quaternion's implied rotation matrix
  // — magnitude-weighted, so it's non-degenerate at any tilt.
  function headingFromQuat(q){
    const [w, x, y, z] = q;
    const flatX = 2 * (x*y - w*z);
    const flatY = 1 - 2 * (x*x + z*z);
    const uprightX = -(2 * (x*z + w*y));
    const uprightY = -(2 * (y*z - w*x));
    const wFlat = Math.hypot(flatX, flatY);
    const wUpright = Math.hypot(uprightX, uprightY);
    const cx = flatX * wFlat + uprightX * wUpright;
    const cy = flatY * wFlat + uprightY * wUpright;
    if(Math.abs(cx) < 1e-9 && Math.abs(cy) < 1e-9) return null;
    return (Math.atan2(cx, cy) * 180 / Math.PI + 360) % 360;
  }

  // ---- Fusion state ----
  let fusedQ = null;              // current best-estimate device→world quaternion
  let lastMotionTime = null;      // for gyro integration dt
  let gyroAvailable = false;      // becomes true once real rotationRate data arrives
  let gyroCheckTimer = null;
  const MAG_CORRECTION_WEIGHT = 0.035; // complementary filter constant — see note in UI copy re: on-device tuning

  function integrateGyroStep(q, wxDegS, wyDegS, wzDegS, dtSec){
    const d2r = Math.PI / 180;
    const omega = [0, wxDegS * d2r, wyDegS * d2r, wzDegS * d2r];
    const dq = quatMultiply(q, omega).map(v => v * 0.5 * dtSec);
    return quatNormalize([q[0]+dq[0], q[1]+dq[1], q[2]+dq[2], q[3]+dq[3]]);
  }

  function onDeviceMotion(event){
    if(!event.rotationRate ||
       event.rotationRate.alpha === null || event.rotationRate.alpha === undefined){
      return; // this device/browser doesn't expose gyroscope data
    }
    if(!gyroAvailable){
      gyroAvailable = true;
      if(gyroCheckTimer){ clearTimeout(gyroCheckTimer); gyroCheckTimer = null; }
      setDebugField('fusion', 'gyro+mag (quaternion)');
    }

    const now = performance.now();
    if(lastMotionTime === null || fusedQ === null){
      lastMotionTime = now;
      return;
    }
    const dt = (now - lastMotionTime) / 1000;
    lastMotionTime = now;
    if(dt <= 0 || dt > 0.5) return; // guard against tab-backgrounding time jumps

    const { alpha: wz, beta: wx, gamma: wy } = event.rotationRate; // deg/s, device-local axes
    fusedQ = integrateGyroStep(fusedQ, wx || 0, wy || 0, wz || 0, dt);

    updateDialFromFusedHeading();
    setDebugField('rotationRate', `α${(wz||0).toFixed(1)} β${(wx||0).toFixed(1)} γ${(wy||0).toFixed(1)} °/s`);
  }

  function magnetometerCorrect(alphaDeg, betaDeg, gammaDeg, trueHeadingOverride){
    let qMag = quatFromEuler(alphaDeg, betaDeg, gammaDeg);

    // iOS: raw alpha is not guaranteed true-north, but webkitCompassHeading
    // is. Rotate qMag about the WORLD vertical axis so its implied heading
    // matches the trusted true-north value before using it as a correction target.
    if(typeof trueHeadingOverride === 'number'){
      const impliedHeading = headingFromQuat(qMag);
      if(impliedHeading !== null){
        let delta = trueHeadingOverride - impliedHeading;
        delta = ((delta + 180) % 360 + 360) % 360 - 180; // shortest signed angle
        const halfRad = (delta * Math.PI / 180) / 2;
        const yawFix = [Math.cos(halfRad), 0, 0, Math.sin(halfRad)];
        qMag = quatMultiply(yawFix, qMag);
      }
    }

    if(fusedQ === null){
      fusedQ = qMag; // first sample — initialize directly, no need to blend
    } else {
      fusedQ = quatNlerpToward(fusedQ, qMag, MAG_CORRECTION_WEIGHT);
    }

    updateDialFromFusedHeading();
  }

  function updateDialFromFusedHeading(){
    if(fusedQ === null) return;
    const heading = headingFromQuat(fusedQ);
    if(heading === null) return;
    pushHeadingToDisplay(heading);
  }

  // Alpha is relative to the device's natural orientation, not the current
  // screen orientation — rotating into landscape throws heading off by ~90°
  // unless corrected.
  function screenAngleCorrection(deg){
    const angle = (screen.orientation && typeof screen.orientation.angle === 'number')
      ? screen.orientation.angle
      : (window.orientation || 0);
    return (deg - angle + 360) % 360;
  }

  function setAccuracyStatus(accuracyDeg, isTrueNorth, hasMagnetometerAbsolute){
    if(typeof accuracyDeg === 'number' && accuracyDeg >= 0){
      // iOS: webkitCompassAccuracy is a real, device-reported error margin
      const kind = accuracyDeg <= 15 ? 'ok' : 'warn';
      setStatus(`Accuracy ±${accuracyDeg.toFixed(0)}° — ${accuracyDeg <= 15 ? 'calibrated' : 'move in a figure-8 to improve calibration'}.`, kind);
    } else if(typeof accuracyDeg === 'number' && accuracyDeg < 0){
      setStatus('Uncalibrated — move your device in a figure-8 motion to calibrate the magnetometer.', 'warn');
    } else if(isTrueNorth === false){
      setStatus('Relative heading only — this device/browser has no magnetometer lock, so this is NOT true north. It will drift from the direction you started in.', 'warn');
    } else if(hasMagnetometerAbsolute){
      setStatus('True north (magnetometer-locked). No formal accuracy figure is exposed by this browser — expect ±5–15° typical, worse near metal or electronics.', 'ok');
    } else {
      setStatus('Heading source uncertain — treat as approximate.', 'warn');
    }
  }

  function setSourceBadge(text, kind){
    sourceBadge.textContent = text;
    sourceBadge.className = 'source-badge' + (kind ? ' ' + kind : '');
    sourceBadge.style.display = 'inline-block';
  }

  // Interference heuristic: a legitimate hand motion changes heading
  // gradually. A single-sample jump this large is a strong signal of
  // magnetic interference (metal desk, speaker magnet, car dashboard)
  // rather than real motion — flagged regardless of which path (fusion
  // or fallback) produced the reading.
  const INTERFERENCE_JUMP_DEG = 45;
  let lastRawHeading = null;
  let interferenceFlagUntil = 0;

  function checkInterference(rawDeg){
    if(lastRawHeading !== null){
      let d = Math.abs(rawDeg - lastRawHeading) % 360;
      if(d > 180) d = 360 - d;
      if(d > INTERFERENCE_JUMP_DEG){
        interferenceFlagUntil = performance.now() + 3000;
      }
    }
    lastRawHeading = rawDeg;
    return performance.now() < interferenceFlagUntil;
  }

  // ---- Single funnel point for putting a heading on screen ----
  // Called from both the gyro+mag fusion path and the one-shot fallback
  // path. Respects GPS override (GPS module manages its own display while
  // active; fusion keeps running silently underneath for a seamless
  // handoff back when the person stops moving).
  function pushHeadingToDisplay(headingDeg){
    if(!hasReading) onFirstReading();
    if(gpsHeadingActive) return;

    const corrected = screenAngleCorrection(headingDeg);
    targetHeading = smoothAngle(corrected);
    hudValue.innerHTML = targetHeading.toFixed(0) + '<span class="hud-deg">°</span>';
    hudLabel.textContent = headingToLabel16(targetHeading);
    setSourceBadge(gyroAvailable ? 'GYRO+MAG FUSION' : 'COMPASS', 'compass');
  }

  // ---- Fallback path: used only while gyroscope data is unavailable ----
  function updateHeadingFallback(rawDeg, isTrueNorth, accuracyDeg, hasMagnetometerAbsolute){
    if(isNaN(rawDeg)) return;
    const normalizedRaw = ((rawDeg % 360) + 360) % 360;
    const interference = checkInterference(normalizedRaw);

    pushHeadingToDisplay(normalizedRaw);

    const now = performance.now();
    if(!updateHeadingFallback._lastStatus || now - updateHeadingFallback._lastStatus > 800){
      if(interference){
        setStatus('Possible magnetic interference detected (sudden jump) — move away from metal, magnets, or electronics.', 'error');
      } else {
        setAccuracyStatus(accuracyDeg, isTrueNorth, hasMagnetometerAbsolute);
      }
      updateHeadingFallback._lastStatus = now;
    }
  }

  // ---- Fusion status messaging (throttled) ----
  let lastFusionStatusAt = 0;
  function reportFusionStatus(interference){
    const now = performance.now();
    if(now - lastFusionStatusAt < 800) return;
    lastFusionStatusAt = now;
    if(interference){
      setStatus('Possible magnetic interference — gyroscope is bridging through it, but move away from metal/magnets if this persists.', 'error');
    } else {
      setStatus('Gyroscope + magnetometer fusion active — smooth, tilt-immune, self-correcting for drift.', 'ok');
    }
  }

  // ---- Sensor debug panel ----
  const debugFields = {};
  let debugRenderQueued = false;
  function setDebugField(key, val){
    debugFields[key] = val;
    if(!debugPanel.classList.contains('show') || debugRenderQueued) return;
    debugRenderQueued = true;
    requestAnimationFrame(() => {
      debugRenderQueued = false;
      debugPanel.innerHTML = Object.entries(debugFields).map(([k,v]) =>
        `<div class="row"><span class="k">${k}</span><span class="v">${v}</span></div>`
      ).join('');
    });
  }
  debugToggle.addEventListener('click', () => {
    const showing = debugPanel.classList.toggle('show');
    debugToggle.textContent = showing ? 'HIDE RAW SENSOR DATA' : 'SHOW RAW SENSOR DATA';
    if(showing) setDebugField('_', '_'); // force a render pass
  });

  // ---- Calibration modal ----
  let calibDismissed = false;
  let calibHideTimer = null;
  function showCalibration(){
    if(calibDismissed) return;
    calibOverlay.classList.add('show');
    calibHideTimer = setTimeout(hideCalibration, 6000);
  }
  function hideCalibration(){
    calibOverlay.classList.remove('show');
    calibDismissed = true;
    if(calibHideTimer){ clearTimeout(calibHideTimer); calibHideTimer = null; }
  }
  calibSkipBtn.addEventListener('click', hideCalibration);

  function orientationHandler(event){
    const firstEvent = !hasReading;

    // iOS Safari: ready-made true-north heading + a real accuracy figure.
    // Still uses the SAME alpha/beta/gamma → quaternion fusion path — the
    // only difference is webkitCompassHeading corrects the yaw component
    // (see magnetometerCorrect) since raw iOS alpha isn't guaranteed true north.
    if(typeof event.webkitCompassHeading === 'number'){
      const accuracy = typeof event.webkitCompassAccuracy === 'number' ? event.webkitCompassAccuracy : undefined;
      setDebugField('source', 'webkitCompassHeading (iOS)');
      setDebugField('raw α/β/γ', `${(event.alpha||0).toFixed(1)} / ${(event.beta||0).toFixed(1)} / ${(event.gamma||0).toFixed(1)}`);
      setDebugField('accuracy', accuracy !== undefined ? `±${accuracy.toFixed(1)}°` : 'n/a');

      if(gyroAvailable && event.alpha !== null && event.beta !== null && event.gamma !== null){
        magnetometerCorrect(event.alpha, event.beta, event.gamma, event.webkitCompassHeading);
        const interference = checkInterference(event.webkitCompassHeading);
        reportFusionStatus(interference);
      } else {
        updateHeadingFallback(event.webkitCompassHeading, true, accuracy, true);
      }
      if(firstEvent) showCalibration();
      return;
    }

    // Android / other browsers
    if(event.alpha !== null && event.alpha !== undefined){
      const hasTilt = (event.beta !== null && event.beta !== undefined &&
                        event.gamma !== null && event.gamma !== undefined);

      setDebugField('source', (event.absolute ? 'deviceorientationabsolute' : 'deviceorientation') + (hasTilt ? '' : ' (no tilt)'));
      setDebugField('raw α/β/γ', hasTilt ? `${event.alpha.toFixed(1)} / ${event.beta.toFixed(1)} / ${event.gamma.toFixed(1)}` : `${event.alpha.toFixed(1)} / — / —`);
      setDebugField('accuracy', 'not exposed by this browser');

      if(!hasTilt){
        updateHeadingFallback((360 - event.alpha) % 360, !!event.absolute, undefined, !!event.absolute);
        if(firstEvent) showCalibration();
        return;
      }

      if(gyroAvailable){
        magnetometerCorrect(event.alpha, event.beta, event.gamma);
        const rawHeading = tiltAwareHeading(event.alpha, event.beta, event.gamma);
        const interference = checkInterference(rawHeading);
        reportFusionStatus(interference);
      } else {
        const heading = tiltAwareHeading(event.alpha, event.beta, event.gamma);
        updateHeadingFallback(heading, !!event.absolute, undefined, !!event.absolute);
      }
      if(firstEvent) showCalibration();
      return;
    }
    // No usable data in this event
  }

  // ------------------------------------------------------------------
  // GPS course-over-ground — same technique Google Maps uses: while
  // actually moving, bearing computed from consecutive high-accuracy GPS
  // fixes is far more reliable than a magnetometer (no tilt sensitivity,
  // no metal/magnetic interference). Stationary, it falls back to compass.
  // ------------------------------------------------------------------
  let gpsWatchId = null;
  let gpsHeadingActive = false;
  let lastGeoFix = null; // {lat, lon, t}
  const GPS_MOVING_THRESHOLD_MPS = 0.8; // ~3 km/h — below this, bearing is unreliable noise

  function toRad(d){ return d * Math.PI / 180; }

  function bearingBetween(lat1, lon1, lat2, lon2){
    const φ1 = toRad(lat1), φ2 = toRad(lat2), Δλ = toRad(lon2 - lon1);
    const y = Math.sin(Δλ) * Math.cos(φ2);
    const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
  }

  function haversineMeters(lat1, lon1, lat2, lon2){
    const R = 6371000;
    const φ1 = toRad(lat1), φ2 = toRad(lat2);
    const dφ = toRad(lat2 - lat1), dλ = toRad(lon2 - lon1);
    const h = Math.sin(dφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(dλ/2)**2;
    return 2 * R * Math.asin(Math.sqrt(h));
  }

  function gpsCourseUpdate(pos){
    const { latitude, longitude, speed, accuracy } = pos.coords;
    const t = pos.timestamp;

    // Trust device-reported speed when available; otherwise derive it.
    let speedMps = (typeof speed === 'number' && speed >= 0) ? speed : null;

    if(lastGeoFix){
      const dtSec = (t - lastGeoFix.t) / 1000;
      if(speedMps === null && dtSec > 0){
        const dist = haversineMeters(lastGeoFix.lat, lastGeoFix.lon, latitude, longitude);
        speedMps = dist / dtSec;
      }

      if(speedMps !== null && speedMps >= GPS_MOVING_THRESHOLD_MPS && dtSec > 0.3){
        const bearing = bearingBetween(lastGeoFix.lat, lastGeoFix.lon, latitude, longitude);
        gpsHeadingActive = true;
        targetHeading = smoothAngle(bearing);
        hudValue.innerHTML = targetHeading.toFixed(0) + '<span class="hud-deg">°</span>';
        hudLabel.textContent = headingToLabel16(targetHeading);
        setSourceBadge('GPS · WALKING', 'gps');
        setStatus(`Course over ground (±${accuracy ? accuracy.toFixed(0) : '?'}m GPS accuracy) while moving.`, 'ok');
      } else {
        // Not moving fast enough for a reliable GPS bearing — hand back to compass
        gpsHeadingActive = false;
      }
    }

    lastGeoFix = { lat: latitude, lon: longitude, t };
  }

  function startGpsBoost(){
    if(!('geolocation' in navigator)){
      setStatus('Geolocation is not available in this browser.', 'error');
      return;
    }
    gpsBtn.disabled = true;
    gpsBtn.textContent = 'Requesting location…';

    gpsWatchId = navigator.geolocation.watchPosition(
      (pos) => {
        gpsBtn.textContent = 'GPS boost active';
        gpsCourseUpdate(pos);
      },
      (err) => {
        gpsHeadingActive = false;
        gpsBtn.disabled = false;
        gpsBtn.textContent = 'Boost accuracy with GPS (for walking)';
        setStatus('Location permission denied or unavailable — using compass only. (' + err.message + ')', 'warn');
      },
      { enableHighAccuracy: true, maximumAge: 1000, timeout: 8000 }
    );
  }

  gpsBtn.addEventListener('click', startGpsBoost);

  function armNoDataTimeout(){
    firstEventTimer = setTimeout(() => {
      if(!hasReading){
        setStatus('No sensor data received. Your device may lack a magnetometer/gyroscope, or your browser is blocking motion sensors.', 'error');
        btn.disabled = false;
        btn.textContent = 'Retry';
      }
    }, 4000);
  }

  async function activate(){
    if(!window.isSecureContext){
      setStatus('Compass access requires HTTPS.', 'error');
      return;
    }

    const hasOrientation = typeof DeviceOrientationEvent !== 'undefined';
    if(!hasOrientation){
      setStatus('This browser does not support the Device Orientation API.', 'error');
      btn.disabled = true;
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Requesting…';

    try{
      if(typeof DeviceOrientationEvent.requestPermission === 'function'){
        const permission = await DeviceOrientationEvent.requestPermission();
        if(permission !== 'granted'){
          setStatus('Permission denied. Enable motion & orientation access in Settings → Safari to use the compass.', 'error');
          btn.disabled = false;
          btn.textContent = 'Enable Compass';
          return;
        }
      }

      // iOS requires a SEPARATE permission grant for DeviceMotionEvent
      // (gyroscope/accelerometer) — DeviceOrientationEvent's grant above
      // does not cover it. Request it too so gyro fusion can activate.
      if(typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function'){
        try{
          await DeviceMotionEvent.requestPermission();
        }catch(_e){ /* non-fatal — falls back to compass-only mode below */ }
      }

      const eventName = ('ondeviceorientationabsolute' in window) ? 'deviceorientationabsolute' : 'deviceorientation';
      window.addEventListener(eventName, orientationHandler, true);

      if(typeof DeviceMotionEvent !== 'undefined'){
        window.addEventListener('devicemotion', onDeviceMotion, true);
      }

      setStatus('Listening for sensor data…', 'warn');
      debugToggle.style.display = 'inline-block';
      btn.style.display = 'none';
      armNoDataTimeout();

      // If no gyroscope data arrives within 1.5s, the device/browser doesn't
      // expose it — commit to compass-only fallback mode rather than
      // silently waiting forever for fusion to kick in.
      gyroCheckTimer = setTimeout(() => {
        if(!gyroAvailable){
          setDebugField('fusion', 'unavailable — compass-only fallback');
        }
      }, 1500);

    }catch(err){
      setStatus('Could not start compass: ' + err.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Enable Compass';
    }
  }

  btn.addEventListener('click', activate);

})();
</script>
</body>
